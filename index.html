<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Моё Мини-приложение</title>
    
    <!-- Подключаем мост к ВКонтакте -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, Roboto, "Segoe UI", sans-serif;
            background-color: #f3f4f6; /* Приятный фон, как в интерфейсе VK */
            color: #19191a;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 12px;
        }
        p {
            line-height: 1.5;
            color: #5c5c5c;
        }
        button {
            background-color: #0077FF; /* Синий цвет кнопки как в VK */
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="greeting">Привет!</h1>
        <p>Это моё первое мини-приложение.</p>
        <button onclick="doAction()">Нажми меня</button>
        <p id="result"></p>
    </div>

    <script>
        // 1. Инициализируем мост
        vkBridge.send('VKWebAppInit');

        // 2. Слушаем ответ от ВКонтакте
        vkBridge.on('VKWebAppInitResult', (e) => {
            const userId = e.detail.user_id;
            document.getElementById('greeting').textContent = `Привет, пользователь №\${userId}!`;
        });

        // 3. Пример функции для кнопки
        function doAction() {
            document.getElementById('result').textContent = 'Кнопка нажата!';
            // Можно отправить событие обратно в VK, если нужно
            // vkBridge.send('VKWebAppShowAlert', { text: 'Привет!' });
        }
    </script>
</body>
</html>
