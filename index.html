<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Моё Мини-приложение</title>
    
    <!-- Подключаем мост к ВКонтакте -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, Roboto, "Segoe UI", sans-serif;
            background-color: var(--vk-background-color, #fff);
            color: var(--vk-base-color, #000);
            min-height: 100vh;
        }

        h1 { font-weight: 600; margin-bottom: 8px; }
        p { color: var(--vk-muted-color, #818C99); margin-bottom: 24px; }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background-color: var(--vk-accent-color, #5181B8);
            color: white;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .error-msg { color: #ff5252; background: #ffebee; padding: 12px; border-radius: 12px; margin-top: 16px; display: none; }
    </style>
</head>
<body>

    <div id="app">
        <h1 id="status-text">Инициализация...</h1>
        <p id="status-desc">Ждём ответа от ВКонтакте...</p>
        <div id="error-box" class="error-msg"></div>
        
        <button id="my-btn" style="display: none;" onclick="doAction()">Нажми меня!</button>
        
        <div id="result" style="margin-top: 20px; padding: 15px; background: #f0f2f5; border-radius: 12px; display: none;"></div>
    </div>

    <script>
        // Функция для безопасного запуска логики
        function initApp() {
            const statusText = document.getElementById('status-text');
            const statusDesc = document.getElementById('status-desc');
            const errorBox = document.getElementById('error-box');
            const btn = document.getElementById('my-btn');

            // 1. Проверка: подключен ли мост
            if (!window.vkBridge) {
                statusText.innerText = 'Ошибка загрузки';
                statusDesc.innerText = 'Не удалось загрузить VK Bridge. Проверьте консоль (F12).';
                errorBox.innerText = 'Библиотека vk-bridge не загрузилась. Проверьте подключение к интернету или CDN.';
                errorBox.style.display = 'block';
                return;
            }

            // 2. Отправляем сигнал инициализации
            window.vkBridge.send('VKWebAppInit');

            // 3. Обработчик успешного ответа
            window.vkBridge.on('VKWebAppInit', (event) => {
                console.log('Данные запуска ВК:', event.detail); // Можно посмотреть в консоли браузера
                
                statusText.innerText = 'Готово!';
                statusDesc.innerText = 'Приложение успешно подключено к платформе VK.';
                btn.style.display = 'block';
            });

            // 4. Обработчик ошибок (если платформа не ответила)
            window.vkBridge.on('VKWebAppError', (event) => {
                console.error('Ошибка VK Bridge:', event.detail);
                statusText.innerText = 'Ошибка платформы';
                statusDesc.innerText = 'Не удалось инициализировать приложение ВКонтакте.';
                errorBox.innerText = 'Код ошибки: ' + (event.detail?.error_code || 'неизвестен');
                errorBox.style.display = 'block';
            });
        }

        // Запускаем проверку сразу, как загрузится скрипт
        initApp();

        // Логика кнопки
        function doAction() {
            const btn = document.getElementById('my-btn');
            const resultDiv = document.getElementById('result');
            
            btn.disabled = true;
            btn.innerText = 'Выполняю...';
            resultDiv.style.display = 'none';

            window.vkBridge.send('VKWebAppShowAlert', {
                text: 'Ура! Кнопка сработала! 🎉',
                button: 'Понял'
            }).then((data) => {
                resultDiv.style.display = 'block';
                resultDiv.innerText = 'Пользователь подтвердил действие. Код работает!';
                btn.disabled = false;
                btn.innerText = 'Нажми меня снова';
            }).catch((err) => {
                console.error('Ошибка вызова метода VK:', err);
                resultDiv.style.display = 'block';
                resultDiv.innerText = 'Произошла ошибка при вызове метода ВКонтакте.';
                btn.disabled = false;
                btn.innerText = 'Нажми меня снова';
            });
        }
    </script>
</body>
</html>
